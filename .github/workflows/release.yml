name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ブラウザ拡張機能のZIPパッケージング
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update extension version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd browser-extension
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          echo "Extension version set to $VERSION"

      - name: Package browser extension
        run: |
          cd browser-extension
          zip -r "../quickmark-extension-${GITHUB_REF_NAME}.zip" . -x ".*"

      - name: Upload extension to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: quickmark-extension-${{ github.ref_name }}.zip
          draft: true

  # デスクトップアプリのビルド
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QuickMark ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install QuickMark."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
