<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <h1>Quick Mark 設定</h1>
    </div>

    <div class="form-group">
      <label for="api-token">APIトークン</label>
      <div class="input-group">
        <input type="password" id="api-token" class="input" placeholder="APIトークンを入力" />
        <button id="toggle-token" class="btn btn-icon" aria-label="トークンの表示/非表示を切り替え">
          <svg id="icon-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="hint" id="token-path-hint"></div>
    </div>

    <div class="form-group">
      <label for="api-port">ポート</label>
      <div class="input-group">
        <input type="number" id="api-port" class="input" placeholder="21579" min="21579" max="21589" />
        <button id="discover-port" class="btn btn-secondary">自動検出</button>
      </div>
    </div>

    <div class="actions">
      <button id="save-btn" class="btn btn-primary">保存</button>
      <button id="test-btn" class="btn btn-secondary">接続テスト</button>
    </div>

    <div id="status" class="status" role="alert" hidden></div>
  </div>

  <script src="../lib/api.js"></script>
  <script src="options.js"></script>
</body>
</html>
